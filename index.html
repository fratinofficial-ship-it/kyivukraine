<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYIV RP | Правила Сервера</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #3b82f6;
        --accent: #60a5fa;
        --neon-blue: #00d4ff;
        --bg-dark: #020617;
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    * {
        margin: 0; padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
        scrollbar-width: none;
    }
    *::-webkit-scrollbar { display: none; }

    body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, #0f172a, #020617);
        color: #f8fafc;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }

    .topbar {
        position: fixed;
        top: 0; width: 100%; height: 85px;
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(20px);
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid rgba(59, 130, 246, 0.3);
        z-index: 1000;
        animation: fadeInDown 1s ease-out;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .title-text {
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 6px;
        text-transform: uppercase;
        background: linear-gradient(to right, #fff, var(--neon-blue));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .container {
        padding-top: 140px;
        width: 95%;
        max-width: 1300px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 50px;
        flex: 1;
    }

    .logo { 
        margin-bottom: 60px; 
        filter: drop-shadow(0 0 20px var(--primary));
        animation: zoomIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes zoomIn {
        from { opacity: 0; transform: scale(0.5); }
        to { opacity: 1; transform: scale(1); }
    }

    .buttons-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 25px;
        width: 100%;
    }

    .btn-rule {
        background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
        border: 1px solid var(--glass-border);
        padding: 45px 30px;
        border-radius: 30px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        opacity: 0;
        transform: translateY(30px);
        filter: blur(5px);
        transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.4s ease, filter 0.8s ease, opacity 0.8s ease;
        will-change: transform, opacity;
        backface-visibility: hidden;
    }

    .btn-rule.show { 
        opacity: 1; 
        transform: translateY(0); 
        filter: blur(0);
    }

    .btn-rule:hover {
        border-color: var(--neon-blue);
        transform: translateY(-10px) scale(1.03);
        box-shadow: 0 20px 50px rgba(0, 212, 255, 0.3);
    }

    .btn-rule i { 
        font-size: 55px; 
        color: var(--accent); 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease; 
    }

    .btn-rule:hover i {
        color: var(--neon-blue);
        transform: scale(1.15);
    }

    .btn-rule span { 
        font-size: 18px; 
        font-weight: 800; 
        text-transform: uppercase; 
        letter-spacing: 1.5px;
        text-align: center;
    }

    .footer-copyright {
        padding: 30px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        color: rgba(248, 250, 252, 0.4);
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.94);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        backdrop-filter: blur(20px);
    }

    .modal-content {
        width: 850px;
        max-width: 95vw;
        max-height: 85vh;
        background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 40px;
        padding: 60px 40px;
        position: relative;
        overflow-y: auto;
    }

    .close-btn {
        position: absolute;
        top: 30px; right: 30px;
        font-size: 22px;
        color: #fff;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.05);
        width: 50px; height: 50px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
        transition: 0.3s;
        border: 1px solid var(--glass-border);
    }

    .close-btn:hover { background: #ef4444; border-color: #ef4444; transform: rotate(90deg); }

    .cat-header {
        font-size: 32px;
        color: #fff;
        text-align: center;
        margin-bottom: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-transform: uppercase;
        font-weight: 900;
    }

    .cat-header i {
        font-size: 70px;
        background: linear-gradient(var(--neon-blue), var(--primary));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.5));
    }

    .rule-item {
        background: rgba(255, 255, 255, 0.03);
        margin-bottom: 22px;
        padding: 30px;
        border-radius: 25px;
        border: 1px solid var(--glass-border);
        opacity: 0;
        transform: translateX(-20px);
        animation: slideIn 0.5s ease-out forwards;
    }

    @keyframes slideIn {
        to { opacity: 1; transform: translateX(0); }
    }

    .rule-item div { font-size: 19px; font-weight: 700; color: #f1f5f9; margin-bottom: 18px; line-height: 1.4; }

    .punish-tag {
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        padding: 10px 20px;
        border-radius: 14px;
        font-weight: 900;
        text-transform: uppercase;
        border: 1.5px solid;
    }

    .punish-red { color: #ff1a1a; background: rgba(255, 26, 26, 0.15); border-color: rgba(255, 26, 26, 0.6); }
    .punish-orange { color: #ffcc00; background: rgba(255, 204, 0, 0.15); border-color: rgba(255, 204, 0, 0.6); }

</style>
</head>
<body>

<div class="topbar">
    <div class="title-text">KYIV RP • ПРАВИЛА</div>
</div>

<div class="container">
    <img src="image_247889.png" class="logo" width="280">
    <div class="buttons-grid" id="btnGrid"></div>
</div>

<footer class="footer-copyright">
    &copy; <span id="year"></span> KYIV RP. Усі права захищено.
</footer>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const categories = [
    { name: "1. ПДР", icon: "fa-solid fa-car-on" },
    { name: "2. Зброя", icon: "fa-solid fa-gun" },
    { name: "3. Голосовий чат", icon: "fa-solid fa-microphone-lines" },
    { name: "4. Атака", icon: "fa-solid fa-hand-fist" },

    { name: "6. Грабування", icon: "fa-solid fa-user-secret" },
    { name: "7. NRP-Поліція", icon: "fa-solid fa-shield-halved" },
    { name: "8. Буллінг", icon: "fa-solid fa-comment-slash" },
    { name: "9. Суд", icon: "fa-solid fa-gavel" },
    { name: "10. Реклама", icon: "fa-solid fa-rectangle-ad" },
    { name: "11. Чіти", icon: "fa-solid fa-triangle-exclamation" },
    { name: "12. Bunnyhop", icon: "fa-solid fa-person-running" },
    { name: "13. Процесуальні дії", icon: "fa-solid fa-file-contract" },

    { name: "16. Державні роботи", icon: "fa-solid fa-briefcase" },
    { name: "17. Зелені зони", icon: "fa-solid fa-shield-heart" }

const rules = [
    ["1 Їзда по зустрічній смузі|ПОКАРАННЯ: Штраф 5000€","1.1 Проїзд на червоне світло|ПОКАРАННЯ: Автоматичний штраф 100€","1.2 Вимкнені фари в темний час|ПОКАРАННЯ: Штраф 2000€","1.3 Неправильне паркування (не на парковкі)|ПОКАРАННЯ: Штраф 3000€","1.4 Невикористання поворотників|ПОКАРАННЯ: Штраф 2500€","1.5 Необережна їзда|ПОКАРАННЯ: Штраф 4500€","1.6 Втеча з місця ДТП|ПОКАРАННЯ: Попередження або Штраф 3500€","1.7 Обгін машини|ПОКАРАННЯ: Штраф 1500€","1.8 Використання маячків без необхідності|ПОКАРАННЯ: Штраф 1000€","1.9 Сільский транспорт в місті (трактор)|ПОКАРАННЯ: Штраф 7000€","1.10 Погоня від поліції|ПОКАРАННЯ: КПЗ або Штраф 8000€","1.11 Перевищення швидкості (>150 км/год)|ПОКАРАННЯ: Штраф 3500€","1.12 Підрізання машини|ПОКАРАННЯ: Штраф 8000€"],
    ["2 Відкрите носіння зброї|ПОКАРАННЯ: Штраф 3000€","2.1 Використання зброї без лицензії|ПОКАРАННЯ: Штраф 5000€ та конфіскація","2.2 Використання зброї без причин|ПОКАРАННЯ: Штраф 8000€ або Депорт 1 доба","2.3 Передача зброї другим особам|ПОКАРАННЯ: Штраф 2500€","2.4 Використання зброї в місті без підстав|ПОКАРАННЯ: Штраф 8000€"],
    ["3 Гучна музика, сторонні звуки|ПОКАРАННЯ: Штраф 4000€","3.1 Російська музика|ПОКАРАННЯ: Депорт 3 доби","3.2 Перебивання|ПОКАРАННЯ: Штраф 3500€","3.3 Сексуальні звуки|ПОКАРАННЯ: Попередження або Штраф 7000€","3.4 Російська пропаганда|ПОКАРАННЯ: Депорт назавжди"],
    ["4 VDM (Vehicle Death Match)|ПОКАРАННЯ: Штраф 6000€ або Депорт 2 доби","4.1 RDM (Random Death Match)|ПОКАРАННЯ: Штраф 5000€ або Депорт 2 доба","4.2 RK (Revenge Kill)|ПОКАРАННЯ: Штраф 4000€ або Депорт 1 доба","4.3 DM (Напад) від 3 ударів|ПОКАРАННЯ: Штраф 3000€","4.4 Вбивство|ПОКАРАННЯ: Штраф 8000€ або КПЗ"],
    ["5 Power Gaming (нерелістичне відігрування)|ПОКАРАННЯ: Попередження або Депорт 2 доби","5.1 Meta Gaming (знання інформації поза грою)|ПОКАРАННЯ: Депорт 2 доби","5.2 Fail RP (невдале RP)|ПОКАРАННЯ: Депорт 1 доба","5.3 CopBaiting (виклик поліції)|ПОКАРАННЯ: Штраф 4000€ або Попередження","5.4 Вбивство AFK-Персонажа|ПОКАРАННЯ: Штраф 8000€","5.5 Відсутність Fear RP (відсутність страху в RP)|ПОКАРАННЯ: Попередження або Депорт 1 доба","5.6 Combat Logging (вихід з бою)|ПОКАРАННЯ: Попередження або Депорт 3 доби","5.7 Мішати офіцеру під час затримання чи погоні та вбивати його, тощо|ПОКАРАННЯ: Депорт 3 доби","5.8 Їздити с злочинцем на поліцейській машині та кафати його щоб другі його не каффнули|ПОКАРАННЯ: Соучастникам та поліцейському - Депорт 16 діб"],
    ["6 Грабування заправки|ПОКАРАННЯ: Штраф 3500€","6.1 Грабування магазину|ПОКАРАННЯ: Штраф 5000€","6.2 Грабування ювелірного магазину|ПОКАРАННЯ: Штраф на розсуд судді та конфіскація","6.3 Грабування банку|ПОКАРАННЯ: КПЗ або Штраф 8000€ та конфіскація","6.4 Грабування торогово автомату|ПОКАРАННЯ: Штраф 1500€","6.5 Грабування контейнера|ПОКАРАННЯ: Штраф 6000€ та конфіскація"],
    ["7 Нрп-кафф без причин|ПОКАРАННЯ: Штраф 7000€ або Депорт 1 доба","7.1 XP без дозволу гравця|ПОКАРАННЯ: Попередження або Штраф 2000€","7.2 Перегляд бази данних на наявність розшуку|ПОКАРАННЯ: Попередження або Штраф 3000€","7.3 Кафф для помсти/троллінгу/буллінга|ПОКАРАННЯ: Депорт 3 доби","7.4 Використання тайзеру без причин|ПОКАРАННЯ: Штраф 8000€ або Депорт 2 доби","7.5 Застосовування сили без необхідності|ПОКАРАННЯ: Штраф на розсуд гравця","7.6 Відходити від поліції далі ніж 5 метрів|ПОКАРАННЯ: Попередження","7.7 Везти в КПЗ без суда|ПОКАРАННЯ: Депорт 2 доби"],
    ["8 Буллінг, сексуальний контент тощо. Поважайте людей|ПОКАРАННЯ: Штраф 6000€","8.1 Буллінг родичів|ПОКАРАННЯ: Депорт 14 діб"],
    ["9 Перебивання судді/адвоката/прокурора|ПОКАРАННЯ: Штраф 6500€","9.1 Ігнорування рішення суду|ПОКАРАННЯ: Депорт 1 доба або Штраф 5000€","9.2 Прикривання друзів чи знайомих, тощо|ПОКАРАННЯ: Зняття з посади та штраф 8000€","9.3 Поміха в суді|ПОКАРАННЯ: Депорт 2 доби або Штраф 5000€","9.4 Тиск на суддю/адвоката/прокурора|ПОКАРАННЯ: Штраф 2000€","9.5 Неповага до судді|ПОКАРАННЯ: Штраф 3000€"],
    ["10 Реклама, спам, провокування|ПОКАРАННЯ: Депорт назавжди"],
    ["11 Чіти, багоюз, тощо|ПОКАРАННЯ: Депорт назавжди"],
    ["12 Bhop (Bunnyhop)|ПОКАРАННЯ: Попередження. Повторний випадок - Депорт 3 доби"],
    ["13 Відсутність відеофіксації порушення та затримання|ПОКАРАННЯ: Штраф 3000€","13.1 Непредставлення (звання, імя, посада)|ПОКАРАННЯ: Депорт 1 доба або Штраф 4000€","13.2 Неоголошення міранди|ПОКАРАННЯ: Штраф 4500€","13.3 Неоголшення статей затриманому|ПОКАРАННЯ: Штраф 4500€"],
    ["14 Уникнення покарання, штраф, депорт (твінки), тощо|ПОКАРАННЯ: Депорт 4 доби/назавжди (якщо обхід бану)","14.1 Вихід під час RP|ПОКАРАННЯ: Депорт 1 доба"],
    ["15 Проникнення на чужу територію|ПОКАРАННЯ: Депорт 1 доба або Штраф 3000€","15.1 Привласнення чужої території|ПОКАРАННЯ: Депорт 3 доби"],
    ["16 Не пропустив швидку допомогу яка їде на виклик|ПОКАРАННЯ: Штраф 8000€","16.1 Вбив державного робітника|ПОКАРАННЯ: КПЗ","16.2 Поламав машину державному робітнику|ПОКАРАННЯ: Компенсація на розсуд державного робітника","16.3 Прикриття злочинця на погоні|ПОКАРАННЯ: Депорт 2 доби або Штраф 5000€","16.4 Береш машини за HARS без відома гравця чи без нього|ПОКАРАННЯ: Попередження або Штраф 3000€"],
    ["17 Бійки в зеленій зоні|ПОКАРАННЯ: Попередження/Депорт 1 доба (залежить від тяжкості)","17.1 Рейд в зеленій зоні|ПОКАРАННЯ: Депорт назавжди","17.2 Стрілянина в зеленій зоні|ПОКАРАННЯ: Депорт 7 діб","17.3 Вбивство в зеленій зоні|ПОКАРАННЯ: Депорт (тимчасовий/назавжди)","17.4 Носити Бронижелет та маску в зеленій зоні|ПОКАРАННЯ: Штраф 4000€"]
];

function init() {
    document.getElementById('year').textContent = new Date().getFullYear();
    const grid = document.getElementById('btnGrid');
    categories.forEach((cat, idx) => {
        const btn = document.createElement('div');
        btn.className = 'btn-rule';
        btn.innerHTML = `<i class="${cat.icon}"></i><span>${cat.name}</span>`;
        btn.onclick = () => openModal(idx);
        grid.appendChild(btn);
        
        setTimeout(() => {
            btn.classList.add('show');
        }, 150 + (idx * 65)); 
    });
}

function openModal(idx) {
    const modal = document.getElementById('modal');
    const body = document.getElementById('modalBody');
    body.innerHTML = `<div class="cat-header"><i class="${categories[idx].icon}"></i>${categories[idx].name}</div>`;
    
    if(idx === 16) body.innerHTML += `<img src="image_247891.png" style="width:100%; border-radius:30px; margin-bottom:30px; border:2px solid var(--neon-blue);">`;

    rules[idx].forEach((ruleStr, rIdx) => {
        const [text, punish] = ruleStr.split('|');
        const isRed = punish.includes('КПЗ') || punish.includes('Депорт') || punish.includes('назавжди') || punish.includes('Зняття');
        const item = document.createElement('div');
        item.className = 'rule-item';
        item.style.animationDelay = `${rIdx * 0.07}s`;
        item.innerHTML = `<div>${text}</div><span class="punish-tag ${isRed ? 'punish-red' : 'punish-orange'}"><i class="fa-solid fa-circle-exclamation" style="margin-right:10px;"></i>${punish}</span>`;
        body.appendChild(item);
    });

    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.body.style.overflow = 'auto';
}

window.onclick = (e) => { if (e.target.id == 'modal') closeModal(); }
init();
</script>

</body>
</html>
