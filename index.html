.container{

    padding-left:40px;
    padding-right:40px;

body{
    min-height:100vh;

    border: 1px solid rgba(59, 130, 246, 0.4);
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    animation: fadeUp 0.8s ease forwards;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:30px;
    width: 100%;

    padding: 0 30px;
    box-sizing: border-box;
}

button{
    padding:42px;
    border-radius:18px;
    border:1px solid rgba(96,165,250,0.35);
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    color:#93c5fd;
    font-size:24px;
    font-weight:700;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 0 10px rgba(59,130,246,0.25);
    width:100%;
}

button:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 0 25px rgba(59,130,246,0.8);
    color:white;
}

.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.7);
    z-index:200;
}

.modal-content{
    width:520px;
    max-width:90vw;
    max-height:85vh;
    overflow-y:auto;
    padding:60px 40px 40px 40px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(59,130,246,0.4);
    box-shadow:0 0 50px rgba(59,130,246,0.7);
    position:relative;
    scrollbar-width:none;
    -ms-overflow-style:none;
}

body.no-scroll{
    overflow: hidden;
    height: 100vh;
    body.no-scroll{
    overflow: hidden;
    height: 100vh;
}
}

body::-webkit-scrollbar{
    width: 0px;
    height: 0px;
}

.close{
    position:absolute;
    top:10px;
    right:10px;
    width:34px;
    height:34px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.2s;
}

.close:hover{
    background:rgba(59,130,246,0.2);
    transform:scale(1.1);
}

.rule{

    border-radius:16px;

    font-size:20px;

.rule:hover{
    border-color:rgba(59,130,246,0.8);

    transform:translateY(-2px);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
        filter: blur(4px);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);

    }

button {

button:nth-child(n) { opacity: 0; animation: fadeUp 0.6s ease forwards; }
button:nth-child(1){animation-delay:0.1s;}

function openModal(i){
    const m=document.getElementById('modal');
    const r=document.getElementById('rules');
    r.innerHTML='';

    document.body.style.overflow='hidden';

    const title=document.createElement('div');
    title.className='category-title';
    title.textContent=categories[i]||'';
    r.appendChild(title);

    r.appendChild(title);

// 👇 ОЦЕ СЮДИ ВСТАВЛЯЄШ
if(i === 16){
    const img = document.createElement('img');
    img.src = "image_247891.png";

    img.style.width = "100%";
    img.style.maxWidth = "450px";
    img.style.display = "block";
    img.style.margin = "15px auto 25px";
    img.style.borderRadius = "16px";
    img.style.boxShadow = "0 0 25px rgba(59,130,246,0.3)";
    r.appendChild(img);
}

    rules[i].forEach(t=>{
        let d=document.createElement('div');
        d.className='rule';

        const [ruleText, punishText] = t.split('|');
        const parts = ruleText.split(' ');
        const id = parts.shift();
        const text = parts.join(' ');

        const isRed = punishText.includes('КПЗ') || punishText.includes('Депорт') || punishText.includes('Зняття з посади');
        const cls = isRed ? 'red' : 'orange';

        d.innerHTML = `<span class='rule-id'>§${id}</span> ${text}<div class='punish-box ${cls}'>${punishText}</div>`;

        r.appendChild(d);
    });

    m.style.display='flex';
}

function closeModal(){
    document.getElementById('modal').style.display='none';
    document.body.style.overflow='auto';
}

window.onclick=(e)=>{if(e.target.id==='modal') closeModal();}
</script>
