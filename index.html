<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgLoIbu-T68wyHGt0YFUuIrnMG9u-3C7U",
        authDomain: "kyiv-7e1ab.firebaseapp.com",
        projectId: "kyiv-7e1ab",
        storageBucket: "kyiv-7e1ab.firebasestorage.app",
        messagingSenderId: "461876253742",
        appId: "1:461876253742:web:71afb40cc9648a99c63bbf"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const OWNER_EMAIL = "fratin.official@gmail.com";

    onAuthStateChanged(auth, (user) => {
        const adminBtn = document.getElementById('adminBtn');
        const authBtn = document.getElementById('authBtn');
        if (user) {
            window.userLoggedIn = true;
            window.userEmail = user.email;
            authBtn.innerHTML = `<img src="${user.photoURL}" id="userPic"><span>${user.displayName.split(' ')[0]}</span><div class="user-menu" id="userMenu"><div class="menu-item" onclick="googleLogout()"><i class="fa-solid fa-right-from-bracket"></i><span>Вийти</span></div></div>`;
            if (user.email === OWNER_EMAIL) adminBtn.style.display = 'flex';
        } else {
            window.userLoggedIn = false;
            window.userEmail = "";
            authBtn.innerHTML = `<i class="fa-brands fa-google"></i><span>Увійти</span>`;
            adminBtn.style.display = 'none';
        }
    });

    window.googleLogin = () => signInWithPopup(auth, provider);
    window.googleLogout = () => signOut(auth);

    window.handleAuthClick = (e) => {
        e.stopPropagation();
        if (!window.userLoggedIn) window.googleLogin();
        else document.getElementById('userMenu')?.classList.toggle('active');
    }

    window.checkNotifications = () => {
        if (!window.userLoggedIn) return;
        let ideas = JSON.parse(localStorage.getItem('server_ideas') || '[]');
        let hasUpdate = false;
        ideas.forEach((idea, index) => {
            if (idea.email === window.userEmail && (idea.status === 'approved' || idea.status === 'rejected') && !idea.notified) {
                if(idea.status === 'approved') showNotification('ПРИЙНЯТО!', 'Твою ідею схвалили! Дякуємо. Незабаром ми її добавимо на сайт.', 'var(--success)');
                else showNotification('ВІДХИЛЕНО', 'На жаль, ідею відхилили. Спробуй ще.', 'var(--error)');
                ideas[index].notified = true;
                hasUpdate = true;
            }
        });
        if (hasUpdate) localStorage.setItem('server_ideas', JSON.stringify(ideas));
    };
    setInterval(window.checkNotifications, 2000);
</script>

    function initGrid() {
        document.getElementById('year').textContent = new Date().getFullYear();
        const grid = document.getElementById('btnGrid');
        categories.forEach((cat, idx) => {
            const btn = document.createElement('div'); btn.className = 'btn-rule'; 
            btn.innerHTML = `<i class="${cat.icon}"></i><span>${cat.name}</span>`; 
            btn.onclick = () => openModal(idx); grid.appendChild(btn); 
            setTimeout(() => btn.classList.add('show'), 50 + (idx * 30));
        });
    }

    function openModal(idx) {
        const body = document.getElementById('modalBody'); 
        body.innerHTML = `<div class="cat-header"><i class="${categories[idx].icon}"></i><span>${categories[idx].name}</span></div>`;
        if (idx === 17) body.innerHTML += `<p style="text-align:center; color:var(--text-muted);">${rules[idx][0]}</p>`;
        else {
            if(idx === 16) body.innerHTML += `<img src="image_247891.png" style="width:100%; border-radius:15px; margin-bottom:20px;">`;
            rules[idx].forEach(r => { 
                const p = r.split('|'); if(p.length < 2) return;
                const isRed = p[1].includes('КПЗ') || p[1].includes('Депорт');
                body.innerHTML += `<div class="rule-item"><div>${p[0]}</div><span class="punish-tag ${isRed ? 'punish-red' : 'punish-orange'}">${p[1]}</span></div>`;
            });
        }
        const modal = document.getElementById('modal'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('open'), 10);
    }

    function handleIdeaButtonClick() {
        if (!window.userLoggedIn) showNotification('УПС!', 'Спочатку увійдіть через Google.', 'var(--admin-color)'); 
        else openIdeaModal();
    }

    function openIdeaModal() {
        document.getElementById('modalBody').innerHTML = `<div class="cat-header"><i class="fa-solid fa-lightbulb"></i>ВАША ІДЕЯ</div><textarea id="ideaText" style="width: 100%; height: 150px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; color: white; resize: none; font-size: 16px; outline:none;" placeholder="Опишіть ідею..."></textarea><div style="text-align:center; margin-top:20px;"><button id="submitIdeaBtn" style="background: var(--success); color: white; border: none; padding: 12px 40px; border-radius: 10px; font-weight: 700; cursor: pointer;" onclick="sendIdea()">НАДІСЛАТИ</button></div>`;
        const modal = document.getElementById('modal'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('open'), 10);
    }

    function sendIdea() {
        const now = Date.now();
        const lastSent = localStorage.getItem('last_idea_time') || 0;
        const cooldown = 180000; 
        const diff = now - lastSent;

        if (diff < cooldown) {
            const rem = cooldown - diff;
            const m = Math.floor(rem / 60000);
            const s = Math.ceil((rem % 60000) / 1000);
            let timeText = m > 0 ? `${m} хв. та ${s} сек.` : `${s} сек.`;
            return showNotification('УВАГА!', `Наступна спроба через ${timeText}`, 'var(--admin-color)');
        }

        const text = document.getElementById('ideaText').value; 
        if(!text.trim()) return showNotification('УВАГА!', 'Поле не може бути порожнім.', 'var(--admin-color)');
        
        const btn = document.getElementById('submitIdeaBtn'); 
        btn.innerHTML = `<i class="fa-solid fa-clock fa-spin"></i> ВІДПРАВКА...`;
        btn.disabled = true;

        setTimeout(() => {
            const ideas = JSON.parse(localStorage.getItem('server_ideas') || '[]');
            ideas.push({ id: Date.now(), email: window.userEmail, text: text, date: new Date().toLocaleString(), status: 'pending', notified: false });
            localStorage.setItem('server_ideas', JSON.stringify(ideas));
            localStorage.setItem('last_idea_time', Date.now());

            document.getElementById('modalBody').innerHTML = `<div style="text-align:center; padding:20px;"><i class="fa-solid fa-circle-check" style="font-size:60px; color:var(--success);"></i><h2 style="margin-top:15px;">НАДІСЛАНО!</h2><p style="color:var(--text-muted); margin:15px 0;">Адмін перевірить вашу ідею. Дякуємо!</p><button onclick="closeModal()" class="btn-nav btn-add-idea" style="margin:0 auto;">ЗАКРИТИ</button></div>`;
        }, 1200);
    }

    function showNotification(title, msg, color) {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div'); notif.className = 'notif';
        notif.style.borderLeftColor = color;
        notif.innerHTML = `<div class="notif-title" style="color:${color}">${title}</div><div class="notif-msg">${msg}</div>`;
        container.appendChild(notif);
        setTimeout(() => { notif.style.opacity = '0'; setTimeout(() => notif.remove(), 500); }, 5000);
    }

    function openAdminPanel() {
        const body = document.getElementById('modalBody'); 
        const ideas = JSON.parse(localStorage.getItem('server_ideas') || '[]');
        body.innerHTML = `<div class="cat-header"><i class="fa-solid fa-user-shield"></i><span>АДМІН ПАНЕЛЬ</span></div>`;
        if(!ideas.length) body.innerHTML += `<p style="text-align:center; color:var(--text-muted);">Ідей немає.</p>`;
        [...ideas].reverse().forEach(i => {
            let st = i.status === 'approved' ? 'st-approved' : (i.status === 'rejected' ? 'st-rejected' : '');
            body.innerHTML += `<div class="admin-item ${st}"><small>${i.date} | ${i.email}</small><p style="margin:8px 0;">${i.text}</p><div class="adm-actions"><button class="btn-adm-act" style="background:var(--success)" onclick="updateIdea(${i.id}, 'approved')" ${i.status!=='pending'?'disabled':''}>ТАК</button><button class="btn-adm-act" style="background:var(--error)" onclick="updateIdea(${i.id}, 'rejected')" ${i.status!=='pending'?'disabled':''}>НІ</button><button class="btn-adm-act" style="background:#444" onclick="deleteIdea(${i.id})">🗑️</button></div></div>`;
        });
        const modal = document.getElementById('modal'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('open'), 10);
    }

    window.updateIdea = (id, status) => {
        let ideas = JSON.parse(localStorage.getItem('server_ideas') || '[]');
        const idx = ideas.findIndex(i => i.id === id);
        if(idx !== -1) { 
            ideas[idx].status = status; ideas[idx].notified = false; 
            localStorage.setItem('server_ideas', JSON.stringify(ideas)); 
            openAdminPanel();
        }
    }

    window.deleteIdea = (id) => {
        let ideas = JSON.parse(localStorage.getItem('server_ideas') || '[]');
        localStorage.setItem('server_ideas', JSON.stringify(ideas.filter(i => i.id !== id))); 
        openAdminPanel();
    }

    window.closeModal = () => { document.getElementById('modal').classList.remove('open'); setTimeout(() => document.getElementById('modal').style.display = 'none', 400); }
    window.closeAllMenus = (e) => { if (!e.target.closest('#authBtn')) document.getElementById('userMenu')?.classList.remove('active'); }
    window.onload = initGrid;
</script>
</body>
</html>
